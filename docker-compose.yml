services:
  db:
    image: postgres:15
    container_name: gitradar-db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5433:5432"
    volumes:
      - postgres_git-radar_data:/var/lib/postgresql/data
  backend:
    build: ./backend
    container_name: gitradar-backend
    restart: always
    depends_on:
      - db
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/${DB_NAME}
      - SPRING_DATASOURCE_USERNAME=${DB_USER}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD}
      - GITHUB_CLIENT_ID=${CLIENT_ID}
      - GITHUB_CLIENT_SECRET=${CLIENT_SECRET}
  gateway:
    image: nginx:stable-alpine
    container_name: gitradar-gateway
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    restart: always
volumes:
  postgres_git-radar_data: