services:
  db:
    image: postgres:15
    container_name: gitradar-db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - postgres_git-radar_data:/var/lib/postgresql/data
  backend:
    build: ./backend
    container_name: gitradar-backend
    ports:
      - "8080:8080" # Device Port : Docker Port
    restart: always
    depends_on:
      - db
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/${DB_NAME}
      - SPRING_DATASOURCE_USERNAME=${DB_USER}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD}
volumes:
  postgres_git-radar_data: